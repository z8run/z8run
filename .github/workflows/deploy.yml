name: Deploy z8run

on:
  push:
    branches: [main]

env:
  DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
  DEPLOY_USER: root
  DEPLOY_PATH: /opt/z8run

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.DEPLOY_HOST }} >> ~/.ssh/known_hosts

      - name: Sync files to server
        run: |
          rsync -avz --delete \
            --exclude '.git' \
            --exclude 'target' \
            --exclude 'frontend/node_modules' \
            --exclude 'frontend/dist' \
            --exclude 'data' \
            --exclude '.env' \
            -e "ssh -i ~/.ssh/deploy_key" \
            ./ ${{ env.DEPLOY_USER }}@${{ env.DEPLOY_HOST }}:${{ env.DEPLOY_PATH }}/

      - name: Build and deploy on server
        run: |
          ssh -i ~/.ssh/deploy_key -o ServerAliveInterval=30 ${{ env.DEPLOY_USER }}@${{ env.DEPLOY_HOST }} << 'EOF'
            cd /opt/z8run

            # Build images (keep cache for faster rebuilds)
            docker compose build

            # Restart with new images
            docker compose up -d --remove-orphans

            # Only prune dangling images (not build cache)
            docker image prune -f

            echo "✓ z8run deployed successfully"
          EOF

      - name: Health check
        run: |
          for i in 1 2 3 4 5; do
            sleep 10
            if ssh -i ~/.ssh/deploy_key ${{ env.DEPLOY_USER }}@${{ env.DEPLOY_HOST }} \
              "curl -sf http://localhost/api/v1/health > /dev/null"; then
              echo "✓ Health check passed (attempt $i)"
              exit 0
            fi
            echo "Attempt $i failed, retrying..."
          done
          echo "✗ Health check failed after 5 attempts"
          ssh -i ~/.ssh/deploy_key ${{ env.DEPLOY_USER }}@${{ env.DEPLOY_HOST }} "docker compose -f /opt/z8run/docker-compose.yml logs --tail=30"
          exit 1

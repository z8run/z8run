name: Deploy z8run

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_Z8RUN: ghcr.io/${{ github.repository }}-api
  IMAGE_NGINX: ghcr.io/${{ github.repository }}-nginx

jobs:
  build-and-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push z8run API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_Z8RUN }}:latest
            ${{ env.IMAGE_Z8RUN }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push nginx image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./deploy/Dockerfile.nginx
          push: true
          tags: |
            ${{ env.IMAGE_NGINX }}:latest
            ${{ env.IMAGE_NGINX }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to Server
    needs: build-and-push
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
      DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
      DEPLOY_PATH: /opt/z8run
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          sparse-checkout: |
            docker-compose.yml
            deploy/nginx.conf

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ env.DEPLOY_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy on server
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Sync only compose + nginx config (no source code needed)
          rsync -avz \
            -e "ssh -i ~/.ssh/deploy_key" \
            docker-compose.yml deploy/nginx.conf \
            ${{ env.DEPLOY_USER }}@${{ env.DEPLOY_HOST }}:${{ env.DEPLOY_PATH }}/

          # Ensure nginx.conf directory exists and move file
          ssh -i ~/.ssh/deploy_key ${{ env.DEPLOY_USER }}@${{ env.DEPLOY_HOST }} << EOF
            mkdir -p ${{ env.DEPLOY_PATH }}/deploy
            mv ${{ env.DEPLOY_PATH }}/nginx.conf ${{ env.DEPLOY_PATH }}/deploy/nginx.conf 2>/dev/null || true
            cd ${{ env.DEPLOY_PATH }}

            # Login to GHCR (automatic, no manual setup needed)
            echo "${GHCR_TOKEN}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # Pull new images
            docker compose pull

            # Restart with new images
            docker compose up -d --remove-orphans

            # Clean up old images
            docker image prune -f

            echo "✓ z8run deployed successfully"
          EOF

      - name: Health check
        run: |
          for i in 1 2 3 4 5; do
            sleep 10
            if ssh -i ~/.ssh/deploy_key ${{ env.DEPLOY_USER }}@${{ env.DEPLOY_HOST }} \
              "curl -sf http://localhost/api/v1/health > /dev/null"; then
              echo "✓ Health check passed (attempt $i)"
              exit 0
            fi
            echo "Attempt $i failed, retrying..."
          done
          echo "✗ Health check failed after 5 attempts"
          ssh -i ~/.ssh/deploy_key ${{ env.DEPLOY_USER }}@${{ env.DEPLOY_HOST }} "docker compose -f ${{ env.DEPLOY_PATH }}/docker-compose.yml logs --tail=30"
          exit 1

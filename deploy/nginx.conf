upstream z8run_backend {
    server z8run:7700;
}

# ── app.z8run.org — The application ──────────────────────
server {
    listen 80;
    server_name app.z8run.org;

    # Frontend (SPA)
    location / {
        root /var/www/html;
        try_files $uri $uri/ /index.html;
    }

    # API routes
    location /api/ {
        proxy_pass         http://z8run_backend;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }

    # Auth routes
    location /auth/ {
        proxy_pass         http://z8run_backend;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Hook routes
    location /hook/ {
        proxy_pass         http://z8run_backend;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # WebSocket
    location /ws/ {
        proxy_pass         http://z8run_backend;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_set_header   X-Real-IP  $remote_addr;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;
    gzip_min_length 1000;

    add_header X-Frame-Options        "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff"    always;
    add_header X-XSS-Protection       "1; mode=block" always;
}

# ── z8run.org — Landing page ─────────────────────────────
server {
    listen 80;
    server_name z8run.org www.z8run.org;

    location / {
        root /var/www/landing;
        try_files $uri $uri/ /index.html;
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;
    gzip_min_length 1000;

    add_header X-Frame-Options        "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff"    always;
    add_header X-XSS-Protection       "1; mode=block" always;
}

# ── Catch-all: redirect to z8run.org ─────────────────────
server {
    listen 80 default_server;
    server_name _;
    return 301 https://z8run.org$request_uri;
}
